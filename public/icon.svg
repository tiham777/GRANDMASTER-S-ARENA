<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'>
  <defs>
    <!-- Background: deep navy → near-black with subtle warmth -->
    <radialGradient id='bg' cx='0.5' cy='0.35' r='0.85'>
      <stop offset='0%' stop-color='#1e1b29'/>
      <stop offset='55%' stop-color='#0d0a14'/>
      <stop offset='100%' stop-color='#04030a'/>
    </radialGradient>

    <!-- Gold gradient for the king piece (multi-stop for depth) -->
    <linearGradient id='gold' x1='0' y1='0' x2='0.3' y2='1'>
      <stop offset='0%' stop-color='#fff5d0'/>
      <stop offset='25%' stop-color='#ffd97a'/>
      <stop offset='55%' stop-color='#e8a838'/>
      <stop offset='85%' stop-color='#9c6418'/>
      <stop offset='100%' stop-color='#6e4408'/>
    </linearGradient>

    <!-- Brighter gold for highlights -->
    <linearGradient id='goldBright' x1='0' y1='0' x2='0' y2='1'>
      <stop offset='0%' stop-color='#fff8e0'/>
      <stop offset='50%' stop-color='#ffe9a8'/>
      <stop offset='100%' stop-color='#f5c451'/>
    </linearGradient>

    <!-- Diagonal shine stripe -->
    <linearGradient id='shine' x1='0' y1='0' x2='1' y2='0'>
      <stop offset='0%' stop-color='#ffffff' stop-opacity='0'/>
      <stop offset='45%' stop-color='#ffffff' stop-opacity='0.55'/>
      <stop offset='55%' stop-color='#ffffff' stop-opacity='0.55'/>
      <stop offset='100%' stop-color='#ffffff' stop-opacity='0'/>
    </linearGradient>

    <!-- Drop shadow filter -->
    <filter id='drop' x='-20%' y='-20%' width='140%' height='140%'>
      <feGaussianBlur stdDeviation='8' in='SourceAlpha' result='blur'/>
      <feOffset dx='0' dy='10' result='offset'/>
      <feComponentTransfer in='offset' result='shadow'>
        <feFuncA type='linear' slope='0.55'/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in='shadow'/>
        <feMergeNode in='SourceGraphic'/>
      </feMerge>
    </filter>

    <!-- King silhouette clip path for shine overlay -->
    <clipPath id='kingClip'>
      <path d='
        M 256 78
        L 256 110
        L 240 110
        L 240 122
        L 226 122
        L 226 134
        L 210 138
        Q 188 148 188 172
        Q 188 196 210 210
        L 198 230
        Q 178 254 178 290
        L 178 322
        L 162 330
        Q 138 344 138 372
        L 138 392
        L 118 392
        Q 100 392 100 410
        L 100 432
        L 412 432
        L 412 410
        Q 412 392 394 392
        L 374 392
        L 374 372
        Q 374 344 350 330
        L 334 322
        L 334 290
        Q 334 254 314 230
        L 302 210
        Q 324 196 324 172
        Q 324 148 302 138
        L 286 134
        L 286 122
        L 272 122
        L 272 110
        L 256 110
        Z
      '/>
    </clipPath>
  </defs>

  <!-- Background with subtle vignette -->
  <rect width='512' height='512' rx='112' ry='112' fill='url(#bg)'/>

  <!-- Thin premium gold border ring -->
  <rect x='8' y='8' width='496' height='496' rx='106' ry='106'
        fill='none' stroke='#f5c451' stroke-opacity='0.22' stroke-width='2.5'/>
  <!-- Inner subtle ring for depth -->
  <rect x='18' y='18' width='476' height='476' rx='98' ry='98'
        fill='none' stroke='#ffffff' stroke-opacity='0.04' stroke-width='1'/>

  <!-- King piece with drop shadow -->
  <g filter='url(#drop)'>
    <!-- Main king silhouette (cross + crown + body + base) -->
    <path d='
      M 256 78
      L 256 110
      L 240 110
      L 240 122
      L 226 122
      L 226 134
      L 210 138
      Q 188 148 188 172
      Q 188 196 210 210
      L 198 230
      Q 178 254 178 290
      L 178 322
      L 162 330
      Q 138 344 138 372
      L 138 392
      L 118 392
      Q 100 392 100 410
      L 100 432
      L 412 432
      L 412 410
      Q 412 392 394 392
      L 374 392
      L 374 372
      Q 374 344 350 330
      L 334 322
      L 334 290
      Q 334 254 314 230
      L 302 210
      Q 324 196 324 172
      Q 324 148 302 138
      L 286 134
      L 286 122
      L 272 122
      L 272 110
      L 256 110
      Z
    ' fill='url(#gold)'/>

    <!-- Diagonal shine stripe across the body -->
    <g clip-path='url(#kingClip)'>
      <rect x='180' y='130' width='90' height='310' fill='url(#shine)' opacity='0.7'/>
    </g>

    <!-- Crown band (decorative ring near the top of body) -->
    <rect x='200' y='200' width='112' height='14' fill='url(#goldBright)' opacity='0.85'/>
    <rect x='200' y='200' width='112' height='3' fill='#ffffff' opacity='0.5'/>
    <rect x='200' y='211' width='112' height='3' fill='#5a3a0a' opacity='0.4'/>

    <!-- Collar band (above base) -->
    <rect x='170' y='320' width='172' height='12' fill='url(#goldBright)' opacity='0.85'/>
    <rect x='170' y='320' width='172' height='2.5' fill='#ffffff' opacity='0.5'/>

    <!-- Base top highlight -->
    <rect x='108' y='392' width='296' height='4' fill='#ffffff' opacity='0.3'/>

    <!-- Cross top highlight -->
    <rect x='252' y='82' width='8' height='26' fill='#ffffff' opacity='0.4'/>

    <!-- Subtle outline for definition -->
    <path d='
      M 256 78
      L 256 110
      L 240 110
      L 240 122
      L 226 122
      L 226 134
      L 210 138
      Q 188 148 188 172
      Q 188 196 210 210
      L 198 230
      Q 178 254 178 290
      L 178 322
      L 162 330
      Q 138 344 138 372
      L 138 392
      L 118 392
      Q 100 392 100 410
      L 100 432
      L 412 432
      L 412 410
      Q 412 392 394 392
      L 374 392
      L 374 372
      Q 374 344 350 330
      L 334 322
      L 334 290
      Q 334 254 314 230
      L 302 210
      Q 324 196 324 172
      Q 324 148 302 138
      L 286 134
      L 286 122
      L 272 122
      L 272 110
      L 256 110
      Z
    ' fill='none' stroke='#3a2604' stroke-opacity='0.45' stroke-width='1.5'/>
  </g>

  <!-- Soft ground shadow -->
  <ellipse cx='256' cy='440' rx='120' ry='6' fill='#000000' opacity='0.5'/>
</svg>